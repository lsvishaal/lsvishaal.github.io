<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Splash Screen</title>
    <!-- Include Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4bw+/aepP/YC94hEpVNVgiZdgIC5+VKNBQNGCHeKRQN+PtmoHDEXuppvnDJzQIu9" crossorigin="anonymous">
    <style>
        /* Customize the gradient background */
        .gradient-splash {
            background: linear-gradient(to right, #9400cf, #da70c1, #da70c1, #9400cf);
            min-height: 100vh;
        }

        /* Style for the splash content */
        .splash-content {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #fff;
        }

        /* Style for the splash button */
        .splash-btn {
            background-color: #721fe6;
            border-color: #721fe6;
            color: #fff;
            padding: 10px 20px;
            border-radius: 15px;
            font-weight: bold;
            text-decoration: none;
            margin: 10px;
        }

        /* Style for the splash button when hovered */
        .splash-btn:hover {
            background-color: #5319a8;
            border-color: #5319a8;
        }
             /* Customize the gradient background */
         .gradient-form {
             background: linear-gradient(to right, #9400cf, #da70c1, #da70c1, #9400cf);
             min-height: 100vh;
         }

        /* Customize the navbar theme with translucent background */
        .navbar {
            background-color: rgba(148, 0, 207, 0.7); /* Translucent background color */
        }

        .navbar .navbar-brand,
        .navbar .nav-link {
            color: #fff; /* Text color to white */
        }

        .navbar .navbar-toggler-icon {
            background-color: #fff; /* Background color to white */
        }

        .navbar .form-control {
            background-color: rgba(255, 255, 255, 0.7); /* Translucent background color */
            border-color: #fff; /* Border color to white */
            color: #000; /* Text color to black */
        }

        .navbar .btn-outline-success {
            border-color: #fff; /* Border color to white */
            color: #fff; /* Text color to white */
        }

    </style>
</head>
<body>

<section class="gradient-splash">
    <div class="container splash-content">
        <h1>Welcome to File Flow</h1>
        <p>Your secure file management solution</p>
        <a href="login.html" class="btn btn-outline-danger splash-btn">Login</a>
        <a href="registration.html" class="btn btn-outline-danger splash-btn">Register</a>
    </div>

</section>

<!-- JS, Popper.js, and jQuery -->
<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
