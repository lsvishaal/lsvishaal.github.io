<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML 5 Boilerplate</title>

    <!-- Include Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300&display=swap" rel="stylesheet">

    <!-- Include Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom background style -->
    <style>
        /* Apply the font to the body */
        body {
            font-family: 'Roboto', sans-serif;
        }

        /* Common button styles */
        .btn-custom {
            padding: 10px 20px;
            border-radius: 15px;
            font-weight: bold;
            text-decoration: none;
            margin: 10px;
            cursor: pointer;
            background-color: #9400cf; /* Purple background color */
            border-color: #9400cf; /* Purple border color */
            color: #fff; /* White text color */
        }

        /* Hover effect for buttons */
        .btn-custom:hover {
            background-color: #ff0000; /* Red background color on hover */
            border-color: #ff0000; /* Red border color on hover */
        }

        /* Customize the gradient background */
        .gradient-form {
            background: linear-gradient(to right, #9400cf, #da70c1, #da70c1, #9400cf);
            min-height: 100vh;
        }

        /* Customize the navbar theme with translucent background */
        .navbar {
            background-color: rgba(148, 0, 207, 0.5);
            backdrop-filter: blur(10px);
        }

        .navbar .navbar-brand,
        .navbar .nav-link {
            color: #fff;
        }

        .navbar .navbar-toggler-icon {
            background-color: #fff;
        }

        /* Style for the simplified modal */
        .simplified-modal {
            background: linear-gradient(to right, #9400cf, #da70c1, #da70c1, #9400cf);
            background-clip: padding-box;
            border: 2px solid rgba(255, 255, 255, 0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            border-radius: 15px;
        }

        /* Style for the login form (initially hidden) */
        .login-form {
            display: none;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            background-color: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(5px);
            border-radius: 15px;
            margin-top: 10px;
        }

        .login-form input {
            margin: 10px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            width: 100%;
        }

        /* Style for the buttons in the modal */
        .simplified-modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
    </style>
</head>
<body>


<section class="gradient-form">
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Navbar</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="#">Home</a>
                    </li>
                </ul>
            </div>
            <button class="btn btn-outline-danger btn-custom login-signup-btn" data-bs-toggle="modal" data-bs-target="#simplifiedModal">Login/Signup</button>
        </div>
    </nav>
</section>

<!-- Simplified Login/Signup Modal -->
<div class="modal fade" id="simplifiedModal" tabindex="-1" role="dialog" aria-labelledby="simplifiedModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg" role="document">
        <div class="modal-content simplified-modal">
            <div class="row">
                <div class="col-lg-6 px-0">
                    <div class="purple-card">
                        <h4 class="mb-4">File Flow</h4>
                        <p class="small mb-0">Copyrights (c). All Rights Reserved</p>
                    </div>
                </div>
                <div class="col-lg-6 px-0">
                    <div class="card rounded-3 text-black custom-card right-card">
                        <div class="card-body p-md-5 mx-md-4">
                            <div class="text-center">
                                <h4 class="mt-1 mb-5 pb-1" style="color: #721fe6; font-size: 2.5em; font-weight: bold;">Secure Login</h4>
                            </div>
                            <form>
                                <h3>Login</h3>

                                <div class="form-outline mb-4">
                                    <label for="username">Enter Your Username:</label>
                                    <input type="text" id="username" class="form-control" placeholder="Username">
                                </div>
                                <div class="form-outline mb-4">
                                    <label for="password">Enter Your Password:</label>
                                    <div class="input-group">
                                        <input type="password" id="password" class="form-control" placeholder="Password">
                                        <span class="input-group-text password-toggle-icon" onclick="togglePasswordVisibility()">
                                            <i class="bi bi-eye" id="password-icon"></i>
                                        </span>
                                    </div>
                                </div>

                                <div class="text-center pt-1 mb-5 pb-1">
                                    <button class="btn btn-outline-danger fa-lg gradient-custom-2 mb-3 login-btn" type="button">Login</button>
                                    <button class="btn btn-outline-danger cancel-btn" type="button">Cancel</button>
                                </div>

                                <div class="d-flex align-items-center justify-content-center pb-4">
                                    <p class="mb-0 me-2">Don't have an account?</p>
                                    <button id="signUpBtn" type="button" class="btn btn-outline-danger">Sign Up</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>



<!-- Include Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>

<!-- JavaScript to toggle login form visibility -->
<script>
    var loginForm = document.getElementById("loginForm");

    document.getElementById("loginButton").addEventListener("click", function () {
        // Toggle the visibility of the login form
        loginForm.style.display = "flex";
    });

    // Add event listener to the Sign Up button in the simplified modal
    document.getElementById("signupButton").addEventListener("click", function () {
        // Implement the logic to show the registration page within the modal
        alert("Registration Page");
    });
</script>

</body>
</html>
