<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML 5 Boilerplate</title>

    <!-- Include Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300&display=swap" rel="stylesheet">

    <!-- Include Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom background style -->
    <style>
        /* Apply the font to the body */
        body {
            font-family: 'Roboto', sans-serif;
        }

        /* Common button styles */
        .btn-custom {
            padding: 10px 20px;
            border-radius: 15px;
            font-weight: bold;
            text-decoration: none;
            margin: 10px;
            cursor: pointer;
            background-color: #9400cf; /* Purple background color */
            border-color: #9400cf; /* Purple border color */
            color: #fff; /* White text color */
        }

        /* Hover effect for buttons */
        .btn-custom:hover {
            background-color: #ff0000; /* Red background color on hover */
            border-color: #ff0000; /* Red border color on hover */
        }

        /* Customize the gradient background */
        .gradient-form {
            background: linear-gradient(to right, #9400cf, #da70c1, #da70c1, #9400cf);
            min-height: 100vh;
        }

        /* Customize the navbar theme with translucent background */
        .navbar {
            background-color: rgba(148, 0, 207, 0.5);
            backdrop-filter: blur(10px);
        }

        .navbar .navbar-brand,
        .navbar .nav-link {
            color: #fff;
        }

        .navbar .navbar-toggler-icon {
            background-color: #fff;
        }

        /* Style for the simplified modal */
        .simplified-modal {
            background: linear-gradient(to right, #9400cf, #da70c1, #da70c1, #9400cf);
            background-clip: padding-box;
            border: 2px solid rgba(255, 255, 255, 0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            border-radius: 15px;
        }

        /* Style for the login form (initially hidden) */
        .login-form {
            display: none;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            background-color: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(5px);
            border-radius: 15px;
            margin-top: 10px;
        }

        .login-form input {
            margin: 10px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            width: 100%;
        }

        /* Style for the buttons in the modal */
        .simplified-modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
    </style>
</head>
<body>


<section class="gradient-form">
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Navbar</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="#">Home</a>
                    </li>
                </ul>
            </div>
            <button class="btn btn-outline-danger btn-custom login-signup-btn" data-bs-toggle="modal" data-bs-target="#simplifiedModal">Login/Signup</button>
        </div>
    </nav>

    <!-- Product Listings Section -->
    <section class="container mt-4">
        <div class="row">
            <!-- Product Card 1 -->
            <div class="col-lg-4">
                <div class="card">
                    <!-- Product Image -->
                    <img src="product1.jpg" class="card-img-top" alt="Product 1">
                    <div class="card-body">
                        <!-- Product Title -->
                        <h5 class="card-title">Product 1</h5>
                        <!-- Product Price -->
                        <p class="card-text">$99.99</p>
                        <!-- Product Description -->
                        <p class="card-text">Description of Product 1 goes here.</p>
                        <!-- Add to Cart Button -->
                        <a href="#" class="btn btn-outline-danger">Add to Cart</a>
                    </div>
                </div>
            </div>

            <!-- Product Card 2 -->
            <div class="col-lg-4">
                <div class="card">
                    <!-- Product Image -->
                    <img src="product2.jpg" class="card-img-top" alt="Product 2">
                    <div class="card-body">
                        <!-- Product Title -->
                        <h5 class="card-title">Product 2</h5>
                        <!-- Product Price -->
                        <p class="card-text">$79.99</p>
                        <!-- Product Description -->
                        <p class="card-text">Description of Product 2 goes here.</p>
                        <!-- Add to Cart Button -->
                        <a href="#" class="btn btn-outline-danger">Add to Cart</a>
                    </div>
                </div>
            </div>

            <!-- Repeat similar product cards for additional products -->
            <!-- Product Card 3 -->
            <div class="col-lg-4">
                <div class="card">
                    <!-- Product Image -->
                    <img src="product3.jpg" class="card-img-top" alt="Product 3">
                    <div class="card-body">
                        <!-- Product Title -->
                        <h5 class="card-title">Product 3</h5>
                        <!-- Product Price -->
                        <p class="card-text">$129.99</p>
                        <!-- Product Description -->
                        <p class="card-text">Description of Product 3 goes here.</p>
                        <!-- Add to Cart Button -->
                        <a href="#" class="btn btn-outline-danger">Add to Cart</a>
                    </div>
                </div>
            </div>
            <!-- Add more product cards as needed -->
        </div>
    </section>

</section>
